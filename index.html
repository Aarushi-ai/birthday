<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Jumanji Birthday Experience</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* This hides the "VR Mode" button for a cleaner look */
        .a-enter-vr { display: none; }
    </style>
</head>
<body>

    <a-scene>
        <a-assets>
            <img id="handsome-guy" src="https://via.placeholder.com/500x800?text=Handsome+Guy">
        </a-assets>

        <a-sky id="background" color="#000000"></a-sky>

        <a-entity id="door-setup" position="0 0 -3">
            <a-box id="door" color="#3d2b1f" width="1.5" height="2.5" depth="0.1" position="0 1.25 0"></a-box>
            <a-text value="OPEN THE DOOR" align="center" position="0 1.5 0.1" color="white" width="4"></a-text>
        </a-entity>

        <a-entity id="party-room" visible="false">
            <a-text value="HAPPY BIRTHDAY PAPA!" position="0 3 -4" align="center" color="#FFD700" scale="2 2 2"></a-text>
            <a-image src="#handsome-guy" position="2 1.25 -4" width="1.5" height="2.5"></a-image>

            <a-cylinder id="cake" color="#ff69b4" height="0.3" radius="0.5" position="0 0.8 -3">
                <a-cylinder id="candle" color="yellow" height="0.15" radius="0.03" position="0 0.22 0"></a-cylinder>
                <a-sphere id="flame" color="orange" radius="0.05" position="0 0.35 0" 
                          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 300; loop: true"></a-sphere>
            </a-cylinder>
            
            <a-text id="blow-instruction" value="NOW BLOW!" position="0 1.5 -3" align="center" color="white" visible="false"></a-text>
        </a-entity>

        <a-entity camera look-controls position="0 1.6 0">
            <a-cursor id="cursor" color="white" fuse="true" fuse-timeout="1000"></a-cursor>
        </a-entity>
    </a-scene>

    <script>
        const door = document.querySelector('#door');
        const bg = document.querySelector('#background');
        const partyRoom = document.querySelector('#party-room');
        const flame = document.querySelector('#flame');
        const instruction = document.querySelector('#blow-instruction');

        // 1. OPENING THE DOOR
        door.addEventListener('click', () => {
            bg.setAttribute('color', '#1a1a2e'); // Deep blue party vibe
            document.querySelector('#door-setup').setAttribute('visible', 'false');
            partyRoom.setAttribute('visible', 'true');
            startMicCheck(); // Start listening for the "Blow"
        });

        // 2. THE BLOWING LOGIC (Using Microphone)
        function startMicCheck() {
            instruction.setAttribute('visible', 'true');
            
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                const audioContext = new AudioContext();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                function detect() {
                    analyser.getByteFrequencyData(dataArray);
                    let volume = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                    
                    if (volume > 45) { // Sensitivity threshold for blowing
                        flame.setAttribute('visible', 'false');
                        instruction.setAttribute('value', 'WISH GRANTED!');
                        // Trigger the Website Card after 2 seconds
                        setTimeout(() => {
                            window.location.href = "your-card-website-link.html"; 
                        }, 2000);
                        return; // Stop checking
                    }
                    requestAnimationFrame(detect);
                }
                microphone.connect(analyser);
                detect();
            })
            .catch(err => console.error("Mic access denied", err));
        }
    </script>
</body>
</html>
